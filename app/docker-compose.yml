services:
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: trans_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d trans_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - storage_data:/app/storage
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

  audio-extraction-worker:
    build: .
    command: celery -A worker.worker worker -Q audio_extraction_queue
      --concurrency=1
      --loglevel=info
    env_file: .env
    volumes:
      - models_data:/app/ai_models
      - storage_data:/app/storage
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  transcription-worker:
    build: .
    command: celery -A worker.worker worker -Q transcription_queue
      --concurrency=1
      --loglevel=info
    env_file: .env
    volumes:
      - models_data:/app/ai_models
      - storage_data:/app/storage
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  translation-worker:
    build: .
    command:
      celery -A worker.worker worker -Q translation_queue
      --concurrency=1
      --loglevel=info
      # --autoscale=2,1
    env_file: .env
    volumes:
      - models_data:/app/ai_models
      - storage_data:/app/storage
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
  dubbing-worker:
    build: .
    command:
      celery -A worker.worker worker -Q dubbing_queue
      --concurrency=1
      --loglevel=info
      # --autoscale=2,1
    env_file: .env
    volumes:
      - models_data:/app/ai_models
      - storage_data:/app/storage
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  video-mixing-worker:
    build: .
    command:
      celery -A worker.worker worker -Q video_mixing_queue
      --concurrency=1
      --loglevel=info
      # --autoscale=2,1
    env_file: .env
    volumes:
      - models_data:/app/ai_models
      - storage_data:/app/storage
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  rabbitmq_data:
  storage_data:
  models_data:
